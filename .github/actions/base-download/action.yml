name: 'Base Download Actions'
description: 'Downloads base KServe image artifacts and loads them into Docker'

inputs:
  images:
    description: 'Space-separated list of image names to load (must match artifact contents)'
    required: false
    default: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer'

runs:
  using: "composite"
  steps:
    - name: Download base image artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: base-*
        path: /tmp/images
        merge-multiple: true

    - name: Load base images
      shell: bash
      run: |
        for img in ${{ inputs.images }}; do
          docker load -i "/tmp/images/${img}.tar" &
        done
        wait
        docker image ls
