name: 'Base Download Actions'
description: 'Pulls KServe images from GHCR and tags them for local use'

inputs:
  images:
    description: 'Space-separated list of image names to pull from GHCR'
    required: false
    default: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer'

runs:
  using: "composite"
  steps:
    - name: Pull and tag images from GHCR
      shell: bash
      run: |
        for img in ${{ inputs.images }}; do
          docker pull "${GHCR_REPO}/${img}:${TAG}"
          docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
        done
        docker image ls
