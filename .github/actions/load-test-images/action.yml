name: 'Load Test Images'
description: 'Loads container images for E2E tests from GHCR (fast) or GHA artifacts (fork-compatible)'

inputs:
  transport:
    description: 'Image transport: ghcr or artifact'
    required: true
  images:
    description: 'Space-separated list of all image names to load'
    required: true

runs:
  using: "composite"
  steps:
    # GHCR mode: parallel pull and retag
    - name: Pull images from GHCR
      if: inputs.transport == 'ghcr'
      shell: bash
      run: |
        for img in ${{ inputs.images }}; do
          docker pull "${GHCR_REPO}/${img}:${TAG}" &
        done
        wait
        for img in ${{ inputs.images }}; do
          docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
        done
        docker image ls

    # Artifact mode: compute precise pattern, download only needed artifacts, and load
    - name: Compute artifact pattern
      id: artifacts
      if: inputs.transport == 'artifact'
      shell: bash
      run: |
        # Map image names to their artifact names based on which build job produced them.
        # kserve-image-build  -> base-<name>
        # graph-tests-build   -> graph-<name>
        # all other builds    -> runtime-<name>
        NAMES=""
        for img in ${{ inputs.images }}; do
          case "$img" in
            kserve-controller|kserve-localmodel-controller|kserve-localmodelnode-agent|agent|router|storage-initializer|qpext)
              NAMES="${NAMES:+$NAMES,}base-$img"
              ;;
            success-200-isvc|error-404-isvc)
              NAMES="${NAMES:+$NAMES,}graph-$img"
              ;;
            *)
              NAMES="${NAMES:+$NAMES,}runtime-$img"
              ;;
          esac
        done
        echo "pattern={$NAMES}" >> $GITHUB_OUTPUT

    - name: Download image artifacts
      if: inputs.transport == 'artifact'
      uses: actions/download-artifact@v4
      with:
        pattern: ${{ steps.artifacts.outputs.pattern }}
        path: /tmp/images
        merge-multiple: true

    - name: Load images from artifacts
      if: inputs.transport == 'artifact'
      shell: bash
      run: |
        for img in ${{ inputs.images }}; do
          docker load -i "/tmp/images/${img}.tar" &
        done
        wait
        docker image ls
