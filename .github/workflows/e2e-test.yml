name: E2E Tests

on:
  pull_request:
    branches: [master, release*]
    paths:
      - "**"
      - "!.github/**"
      - "!docs/**"
      - "!**.md"
      - ".github/workflows/e2e-test.yml"
      - ".github/actions/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GHCR_REPO: ghcr.io/${{ github.repository }}
  TAG: ${{ github.sha }}
  KO_DOCKER_REPO: "kserve"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Detect changes — conditionally trigger helm or kustomize tests
  # ---------------------------------------------------------------------------

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      install_methods: ${{ steps.set-matrix.outputs.install_methods }}
      use_ghcr: ${{ steps.transport.outputs.use_ghcr }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect image transport mode
        id: transport
        run: |
          # Use GHCR for push events and same-repo PRs (faster pulls).
          # Fall back to GHA artifacts for fork PRs (no packages:write permission).
          if [[ "${{ github.event_name }}" != "pull_request" ]] || \
             [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
            echo "use_ghcr=true" >> $GITHUB_OUTPUT
          else
            echo "use_ghcr=false" >> $GITHUB_OUTPUT
          fi
      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            charts:
              - 'charts/**'
            non_charts:
              - '**'
              - '!charts/**'
      - id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo 'install_methods=["kustomize","helm"]' >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.charts }}" == "true" && \
                  "${{ steps.filter.outputs.non_charts }}" == "true" ]]; then
            echo 'install_methods=["kustomize","helm"]' >> $GITHUB_OUTPUT
          elif [[ "${{ steps.filter.outputs.charts }}" == "true" ]]; then
            echo 'install_methods=["helm"]' >> $GITHUB_OUTPUT
          else
            echo 'install_methods=["kustomize"]' >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # Build jobs — matrix + GHCR push
  # ---------------------------------------------------------------------------

  kserve-image-build:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        image:
          - { name: kserve-controller, dockerfile: Dockerfile, context: "." }
          - { name: kserve-localmodel-controller, dockerfile: localmodel.Dockerfile, context: "." }
          - { name: kserve-localmodelnode-agent, dockerfile: localmodel-agent.Dockerfile, context: "." }
          - { name: agent, dockerfile: agent.Dockerfile, context: "." }
          - { name: router, dockerfile: router.Dockerfile, context: "." }
          - { name: storage-initializer, dockerfile: python/storage-initializer.Dockerfile, context: python }
          - { name: qpext, dockerfile: qpext/qpext.Dockerfile, context: "." }
    steps:
      - uses: actions/checkout@v4
      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - name: Login to GHCR
        if: needs.detect-changes.outputs.use_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          push: ${{ needs.detect-changes.outputs.use_ghcr == 'true' }}
          load: ${{ needs.detect-changes.outputs.use_ghcr != 'true' }}
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: >-
            ${{ needs.detect-changes.outputs.use_ghcr == 'true'
            && format('{0}/{1}:{2}', env.GHCR_REPO, matrix.image.name, github.sha)
            || format('kserve/{0}:{1}', matrix.image.name, github.sha) }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
      - name: Save and upload ${{ matrix.image.name }}
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        run: docker save kserve/${{ matrix.image.name }}:${{ env.TAG }} -o /tmp/${{ matrix.image.name }}.tar
      - uses: actions/upload-artifact@v4
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        with:
          name: base-${{ matrix.image.name }}
          path: /tmp/${{ matrix.image.name }}.tar
          compression-level: 0
          if-no-files-found: error

  predictor-runtime-build:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        image:
          - { name: sklearnserver, dockerfile: sklearn.Dockerfile, cache-mode: max }
          - { name: xgbserver, dockerfile: xgb.Dockerfile, cache-mode: max }
          - { name: lgbserver, dockerfile: lgb.Dockerfile, cache-mode: max }
          - { name: pmmlserver, dockerfile: pmml.Dockerfile, cache-mode: min }
          - { name: paddleserver, dockerfile: paddle.Dockerfile, cache-mode: min }
          - { name: predictiveserver, dockerfile: predictiveserver.Dockerfile, cache-mode: min }
          - { name: custom-model-grpc, dockerfile: custom_model_grpc.Dockerfile, cache-mode: min }
          - { name: custom-image-transformer-grpc, dockerfile: custom_transformer_grpc.Dockerfile, cache-mode: min }
          - { name: image-transformer, dockerfile: custom_transformer.Dockerfile, cache-mode: min }
    steps:
      - uses: actions/checkout@v4
      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - name: Login to GHCR
        if: needs.detect-changes.outputs.use_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          push: ${{ needs.detect-changes.outputs.use_ghcr == 'true' }}
          load: ${{ needs.detect-changes.outputs.use_ghcr != 'true' }}
          context: python
          file: python/${{ matrix.image.dockerfile }}
          tags: >-
            ${{ needs.detect-changes.outputs.use_ghcr == 'true'
            && format('{0}/{1}:{2}', env.GHCR_REPO, matrix.image.name, github.sha)
            || format('kserve/{0}:{1}', matrix.image.name, github.sha) }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=${{ matrix.image.cache-mode }},scope=${{ matrix.image.name }}
      - name: Save and upload ${{ matrix.image.name }}
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        run: docker save kserve/${{ matrix.image.name }}:${{ env.TAG }} -o /tmp/${{ matrix.image.name }}.tar
      - uses: actions/upload-artifact@v4
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        with:
          name: runtime-${{ matrix.image.name }}
          path: /tmp/${{ matrix.image.name }}.tar
          compression-level: 0
          if-no-files-found: error

  huggingfaceserver-build:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - name: Login to GHCR
        if: needs.detect-changes.outputs.use_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build huggingfaceserver
        uses: docker/build-push-action@v6
        with:
          push: ${{ needs.detect-changes.outputs.use_ghcr == 'true' }}
          load: ${{ needs.detect-changes.outputs.use_ghcr != 'true' }}
          context: python
          file: python/huggingface_server_cpu.Dockerfile
          tags: >-
            ${{ needs.detect-changes.outputs.use_ghcr == 'true'
            && format('{0}/huggingfaceserver:{1}', env.GHCR_REPO, github.sha)
            || format('kserve/huggingfaceserver:{0}', github.sha) }}
          cache-from: type=gha,scope=huggingfaceserver
          # Inline cache embeds metadata in the pushed image (zero export overhead).
          # Falls back to GHA cache for fork PRs that can't push to GHCR.
          cache-to: >-
            ${{ needs.detect-changes.outputs.use_ghcr == 'true'
            && 'type=inline'
            || 'type=gha,mode=min,scope=huggingfaceserver' }}
      - name: Save and upload huggingfaceserver
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        run: docker save kserve/huggingfaceserver:${{ env.TAG }} -o /tmp/huggingfaceserver.tar
      - uses: actions/upload-artifact@v4
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        with:
          name: runtime-huggingfaceserver
          path: /tmp/huggingfaceserver.tar
          compression-level: 0
          if-no-files-found: error

  explainer-runtime-build:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    steps:
      - uses: actions/checkout@v4
      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - name: Login to GHCR
        if: needs.detect-changes.outputs.use_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build art-explainer
        uses: docker/build-push-action@v6
        with:
          push: ${{ needs.detect-changes.outputs.use_ghcr == 'true' }}
          load: ${{ needs.detect-changes.outputs.use_ghcr != 'true' }}
          context: python
          file: python/artexplainer.Dockerfile
          tags: >-
            ${{ needs.detect-changes.outputs.use_ghcr == 'true'
            && format('{0}/art-explainer:{1}', env.GHCR_REPO, github.sha)
            || format('kserve/art-explainer:{0}', github.sha) }}
          cache-from: type=gha,scope=art-explainer
          cache-to: type=gha,mode=min,scope=art-explainer
      - name: Save and upload art-explainer
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        run: docker save kserve/art-explainer:${{ env.TAG }} -o /tmp/art-explainer.tar
      - uses: actions/upload-artifact@v4
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        with:
          name: runtime-art-explainer
          path: /tmp/art-explainer.tar
          compression-level: 0
          if-no-files-found: error

  graph-tests-images-build:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: success-200-isvc, dockerfile: success_200_isvc.Dockerfile }
          - { name: error-404-isvc, dockerfile: error_404_isvc.Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - name: Merge target branch
        if: github.event_name == 'pull_request'
        run: |
          git fetch --unshallow origin
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git config user.email "ci@kserve.io"
          git config user.name "CI Bot"
          git merge --no-edit origin/${{ github.event.pull_request.base.ref }}
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - name: Login to GHCR
        if: needs.detect-changes.outputs.use_ghcr == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          push: ${{ needs.detect-changes.outputs.use_ghcr == 'true' }}
          load: ${{ needs.detect-changes.outputs.use_ghcr != 'true' }}
          context: python
          file: python/${{ matrix.image.dockerfile }}
          tags: >-
            ${{ needs.detect-changes.outputs.use_ghcr == 'true'
            && format('{0}/{1}:{2}', env.GHCR_REPO, matrix.image.name, github.sha)
            || format('kserve/{0}:{1}', matrix.image.name, github.sha) }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=min,scope=${{ matrix.image.name }}
      - name: Save and upload ${{ matrix.image.name }}
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        run: docker save kserve/${{ matrix.image.name }}:${{ env.TAG }} -o /tmp/${{ matrix.image.name }}.tar
      - uses: actions/upload-artifact@v4
        if: needs.detect-changes.outputs.use_ghcr != 'true'
        with:
          name: graph-${{ matrix.image.name }}
          path: /tmp/${{ matrix.image.name }}.tar
          compression-level: 0
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Test jobs
  # ---------------------------------------------------------------------------

  test-predictor:
    runs-on: ubuntu-latest
    needs: [detect-changes, kserve-image-build, predictor-runtime-build, huggingfaceserver-build]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Load test images
        uses: ./.github/actions/load-test-images
        with:
          transport: ${{ needs.detect-changes.outputs.use_ghcr == 'true' && 'ghcr' || 'artifact' }}
          images: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer sklearnserver xgbserver lgbserver pmmlserver paddleserver predictiveserver custom-model-grpc custom-image-transformer-grpc huggingfaceserver image-transformer'

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ${{ matrix.install-method == 'helm' && format('export SET_KSERVE_VERSION={0}', env.TAG) || '' }}
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run predictor E2E tests
        timeout-minutes: 40
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "predictor" "8"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-transformer-mms:
    runs-on: ubuntu-latest
    needs:
      [detect-changes, kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Load test images
        uses: ./.github/actions/load-test-images
        with:
          transport: ${{ needs.detect-changes.outputs.use_ghcr == 'true' && 'ghcr' || 'artifact' }}
          images: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer sklearnserver xgbserver predictiveserver custom-model-grpc custom-image-transformer-grpc image-transformer art-explainer'

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ${{ matrix.install-method == 'helm' && format('export SET_KSERVE_VERSION={0}', env.TAG) || '' }}
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "transformer or mms or collocation" "6"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-explainer:
    runs-on: ubuntu-latest
    needs: [detect-changes, kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Load test images
        uses: ./.github/actions/load-test-images
        with:
          transport: ${{ needs.detect-changes.outputs.use_ghcr == 'true' && 'ghcr' || 'artifact' }}
          images: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer sklearnserver art-explainer'

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ${{ matrix.install-method == 'helm' && format('export SET_KSERVE_VERSION={0}', env.TAG) || '' }}
          ./test/scripts/gh-actions/setup-kserve.sh
          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run explainer E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "explainer" "1"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-graph:
    runs-on: ubuntu-latest
    needs:
      [detect-changes, kserve-image-build, predictor-runtime-build, graph-tests-images-build]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Load test images
        uses: ./.github/actions/load-test-images
        with:
          transport: ${{ needs.detect-changes.outputs.use_ghcr == 'true' && 'ghcr' || 'artifact' }}
          images: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer sklearnserver xgbserver predictiveserver success-200-isvc error-404-isvc'

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ${{ matrix.install-method == 'helm' && format('export SET_KSERVE_VERSION={0}', env.TAG) || '' }}
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests for graph
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "graph" "6"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-path-based-routing:
    runs-on: ubuntu-latest
    needs:
      [detect-changes, kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Load test images
        uses: ./.github/actions/load-test-images
        with:
          transport: ${{ needs.detect-changes.outputs.use_ghcr == 'true' && 'ghcr' || 'artifact' }}
          images: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer sklearnserver xgbserver lgbserver predictiveserver image-transformer art-explainer'

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ${{ matrix.install-method == 'helm' && format('export SET_KSERVE_VERSION={0}', env.TAG) || '' }}
          export KSERVE_CUSTOM_ISVC_CONFIGS='ingress.pathTemplate=/serving/{{ .Namespace }}/{{ .Name }}|ingress.ingressDomain=mydomain.com'
          export NETWORK_LAYER='istio-ingress'
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests with path-based routing
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "path_based_routing" "6"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-path-based-routing-explainer:
    runs-on: ubuntu-latest
    needs: [detect-changes, kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Load test images
        uses: ./.github/actions/load-test-images
        with:
          transport: ${{ needs.detect-changes.outputs.use_ghcr == 'true' && 'ghcr' || 'artifact' }}
          images: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer sklearnserver art-explainer'

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ${{ matrix.install-method == 'helm' && format('export SET_KSERVE_VERSION={0}', env.TAG) || '' }}
          export KSERVE_CUSTOM_ISVC_CONFIGS='ingress.pathTemplate=/serving/{{ .Namespace }}/{{ .Name }}|ingress.ingressDomain=mydomain.com'
          export NETWORK_LAYER='istio-ingress'
          ./test/scripts/gh-actions/setup-kserve.sh
          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run path-based routing explainer E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "explainer" "1"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-qpext:
    runs-on: ubuntu-latest
    needs: [detect-changes, kserve-image-build, predictor-runtime-build]
    strategy:
      fail-fast: false
      matrix:
        install-method: ${{ fromJSON(needs.detect-changes.outputs.install_methods) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Load test images
        uses: ./.github/actions/load-test-images
        with:
          transport: ${{ needs.detect-changes.outputs.use_ghcr == 'true' && 'ghcr' || 'artifact' }}
          images: 'kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer qpext sklearnserver predictiveserver'

      - name: Install KServe
        run: |
          ${{ matrix.install-method == 'helm' && 'export INSTALL_METHOD="helm"' || '' }}
          ${{ matrix.install-method == 'helm' && format('export SET_KSERVE_VERSION={0}', env.TAG) || '' }}
          ./test/scripts/gh-actions/setup-kserve.sh
          kubectl get pods -n kserve
          kubectl describe pods -n kserve
      - name: Patch qpext image
        run: |
          kubectl patch knativeserving knative-serving -n knative-serving --type=merge \
            --patch '{"spec":{"config":{"deployment":{"queue-sidecar-image":"kserve/qpext:${{ env.TAG }}"},"observability":{"request-metrics-protocol":"prometheus"}}}}'
          kubectl wait --for=condition=Ready -n knative-serving knativeserving knative-serving --timeout=120s
          kubectl get configmap config-deployment -n knative-serving -o jsonpath='{.data.queue-sidecar-image}'
          echo
      - name: Run queue proxy extension E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-qpext-test.sh

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

