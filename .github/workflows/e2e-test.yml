name: E2E Tests

on:
  pull_request:
    branches: [master, release*]
    paths:
      - "**"
      - "!.github/**"
      - "!docs/**"
      - "!**.md"
      - ".github/workflows/e2e-test.yml"
      - ".github/actions/**"
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TAG: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.sha }}
  DOCKER_IMAGES_PATH: "/mnt/docker-images"
  KO_DOCKER_REPO: "kserve"
  GHCR_REPO: ghcr.io/${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Build jobs — matrix + GHCR push
  # ---------------------------------------------------------------------------

  kserve-image-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: kserve-controller, dockerfile: Dockerfile, context: "." }
          - { name: kserve-localmodel-controller, dockerfile: localmodel.Dockerfile, context: "." }
          - { name: kserve-localmodelnode-agent, dockerfile: localmodel-agent.Dockerfile, context: "." }
          - { name: agent, dockerfile: agent.Dockerfile, context: "." }
          - { name: router, dockerfile: router.Dockerfile, context: "." }
          - { name: storage-initializer, dockerfile: python/storage-initializer.Dockerfile, context: python }
          - { name: qpext, dockerfile: qpext/qpext.Dockerfile, context: "." }
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          tags: ${{ env.GHCR_REPO }}/${{ matrix.image.name }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

  predictor-runtime-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: sklearnserver, dockerfile: sklearn.Dockerfile, cache-mode: max }
          - { name: xgbserver, dockerfile: xgb.Dockerfile, cache-mode: max }
          - { name: lgbserver, dockerfile: lgb.Dockerfile, cache-mode: max }
          - { name: pmmlserver, dockerfile: pmml.Dockerfile, cache-mode: min }
          - { name: paddleserver, dockerfile: paddle.Dockerfile, cache-mode: min }
          - { name: custom-model-grpc, dockerfile: custom_model_grpc.Dockerfile, cache-mode: min }
          - { name: custom-image-transformer-grpc, dockerfile: custom_transformer_grpc.Dockerfile, cache-mode: min }
          - { name: image-transformer, dockerfile: custom_transformer.Dockerfile, cache-mode: min }
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: python
          file: python/${{ matrix.image.dockerfile }}
          tags: ${{ env.GHCR_REPO }}/${{ matrix.image.name }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=${{ matrix.image.cache-mode }},scope=${{ matrix.image.name }}

  huggingfaceserver-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push huggingfaceserver
        uses: docker/build-push-action@v6
        with:
          push: true
          context: python
          file: python/huggingface_server_cpu.Dockerfile
          tags: ${{ env.GHCR_REPO }}/huggingfaceserver:${{ env.TAG }}
          cache-from: type=gha,scope=huggingfaceserver
          cache-to: type=gha,mode=min,scope=huggingfaceserver

  explainer-runtime-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push art-explainer
        uses: docker/build-push-action@v6
        with:
          push: true
          context: python
          file: python/artexplainer.Dockerfile
          tags: ${{ env.GHCR_REPO }}/art-explainer:${{ env.TAG }}
          cache-from: type=gha,scope=art-explainer
          cache-to: type=gha,mode=min,scope=art-explainer

  graph-tests-images-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - { name: success-200-isvc, dockerfile: success_200_isvc.Dockerfile }
          - { name: error-404-isvc, dockerfile: error_404_isvc.Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-up-disk-space
      - uses: docker/setup-buildx-action@v3
        with:
          cache-binary: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: python
          file: python/${{ matrix.image.dockerfile }}
          tags: ${{ env.GHCR_REPO }}/${{ matrix.image.name }}:${{ env.TAG }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=min,scope=${{ matrix.image.name }}

  # ---------------------------------------------------------------------------
  # Test jobs
  # ---------------------------------------------------------------------------

  test-predictor:
    runs-on: ubuntu-latest
    needs: [kserve-image-build, predictor-runtime-build, huggingfaceserver-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull predictor runtime images
        run: |
          for img in sklearnserver xgbserver lgbserver pmmlserver paddleserver custom-model-grpc custom-image-transformer-grpc huggingfaceserver image-transformer; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver xgbserver lgbserver pmmlserver paddleserver custom-model-grpc custom-image-transformer-grpc huggingfaceserver image-transformer; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run predictor E2E tests
        timeout-minutes: 40
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "predictor" "8"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-transformer-mms:
    runs-on: ubuntu-latest
    needs:
      [kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull runtime images
        run: |
          for img in sklearnserver xgbserver custom-model-grpc custom-image-transformer-grpc image-transformer art-explainer; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver xgbserver custom-model-grpc custom-image-transformer-grpc image-transformer art-explainer; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "transformer or mms or collocation" "6"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-explainer:
    runs-on: ubuntu-latest
    needs: [kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull runtime images
        run: |
          for img in sklearnserver art-explainer; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver art-explainer; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh
          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run explainer E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "explainer" "1"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-graph:
    runs-on: ubuntu-latest
    needs:
      [kserve-image-build, predictor-runtime-build, graph-tests-images-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull runtime images
        run: |
          for img in sklearnserver xgbserver success-200-isvc error-404-isvc; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver xgbserver success-200-isvc error-404-isvc; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests for graph
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "graph" "6"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-path-based-routing:
    runs-on: ubuntu-latest
    needs:
      [kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull runtime images
        run: |
          for img in sklearnserver xgbserver lgbserver image-transformer art-explainer; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver xgbserver lgbserver image-transformer art-explainer; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done
          docker image ls

      - name: Install KServe
        run: |
          export KSERVE_CUSTOM_ISVC_CONFIGS='ingress.pathTemplate=/serving/{{ .Namespace }}/{{ .Name }}|ingress.ingressDomain=mydomain.com'
          export NETWORK_LAYER='istio-ingress'
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests with path-based routing
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "path_based_routing" "6"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-path-based-routing-explainer:
    runs-on: ubuntu-latest
    needs: [kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull runtime images
        run: |
          for img in sklearnserver art-explainer; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver art-explainer; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done

      - name: Install KServe
        run: |
          export KSERVE_CUSTOM_ISVC_CONFIGS='ingress.pathTemplate=/serving/{{ .Namespace }}/{{ .Name }}|ingress.ingressDomain=mydomain.com'
          export NETWORK_LAYER='istio-ingress'
          ./test/scripts/gh-actions/setup-kserve.sh
          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run path-based routing explainer E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "explainer" "1"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-qpext:
    runs-on: ubuntu-latest
    needs: [kserve-image-build, predictor-runtime-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull qpext and sklearn server images
        run: |
          for img in qpext sklearnserver; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in qpext sklearnserver; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh
          kubectl get pods -n kserve
          kubectl describe pods -n kserve
      - name: Patch qpext image
        run: |
          kubectl patch configmaps -n knative-serving config-deployment --patch '{"data": {"queue-sidecar-image": "kserve/qpext:${{ env.TAG }}"}}'
          kubectl describe configmaps -n knative-serving config-deployment
      - name: Run queue proxy extension E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-qpext-test.sh

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-with-helm:
    runs-on: ubuntu-latest
    needs: [kserve-image-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Install Kserve from helm
        run: |
          ./test/scripts/gh-actions/setup-kserve-helm.sh
          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests
        timeout-minutes: 20
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "helm"
          kubectl get pods -n kserve

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-raw:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        # Test with Ingress and Gateway API
        network-layer: ["istio-ingress", "envoy-gatewayapi", "istio-gatewayapi"]
    needs:
      [kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup
        with:
          deployment-mode: "raw"
          enable-keda: "true"
          network-layer: ${{ matrix.network-layer }}
          minikube-addons: metrics-server

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull runtime images
        run: |
          for img in sklearnserver xgbserver custom-model-grpc custom-image-transformer-grpc image-transformer art-explainer; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver xgbserver custom-model-grpc custom-image-transformer-grpc image-transformer art-explainer; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh "Standard" ${{ matrix.network-layer }}

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Log the config map
        run: |
          kubectl describe configmaps -n kserve inferenceservice-config

      - name: Run E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "raw" "6" ${{ matrix.network-layer }}

      - name: Patch inferenceservice config for path based routing
        if: matrix.network-layer == 'envoy-gatewayapi' || matrix.network-layer == 'istio-gatewayapi'
        run: |
          kubectl patch configmaps -n kserve inferenceservice-config --patch-file config/overlays/test/configmap/inferenceservice-path-template.yaml
          kubectl describe configmaps -n kserve inferenceservice-config

      - name: Run E2E tests with path based routing
        if: matrix.network-layer == 'envoy-gatewayapi' || matrix.network-layer == 'istio-gatewayapi'
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "raw" "6" ${{ matrix.network-layer }}

      - name: Patch inferenceservice config for cluster ip none
        run: |
          kubectl patch configmaps -n kserve inferenceservice-config --patch-file config/overlays/test/configmap/inferenceservice-enable-cluster-ip.yaml
          kubectl describe configmaps -n kserve inferenceservice-config

      - name: Run E2E tests - cluster ip none
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "rawcipn" "1" ${{ matrix.network-layer }}

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-autoscaling:
    runs-on: ubuntu-latest
    needs:
      [kserve-image-build, predictor-runtime-build, explainer-runtime-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup
        with:
          deployment-mode: "raw"
          enable-keda: "true"
          network-layer: "istio-ingress"
          minikube-addons: metrics-server

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull sklearn server image
        run: |
          docker pull "${GHCR_REPO}/sklearnserver:${TAG}"
          docker tag "${GHCR_REPO}/sklearnserver:${TAG}" "kserve/sklearnserver:${TAG}"
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh "Standard" "istio-ingress"

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Log the config map
        run: |
          kubectl describe configmaps -n kserve inferenceservice-config

      - name: Run E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "autoscaling" "6" "istio-ingress"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-kourier:
    runs-on: ubuntu-latest
    needs:
      [kserve-image-build, predictor-runtime-build, graph-tests-images-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup
        with:
          network-layer: kourier

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull runtime images
        run: |
          for img in sklearnserver xgbserver success-200-isvc error-404-isvc; do
            docker pull "${GHCR_REPO}/${img}:${TAG}" &
          done
          wait
          for img in sklearnserver xgbserver success-200-isvc error-404-isvc; do
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
          done
          docker image ls

      - name: Install KServe
        run: |
          export KSERVE_CUSTOM_ISVC_CONFIGS='ingress.disableIstioVirtualHost=true'
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests
        timeout-minutes: 30
        run: |
          export KSERVE_INGRESS_HOST_PORT=$(kubectl get pod -n knative-serving -l "app=3scale-kourier-gateway" \
          --output=jsonpath="{.items[0].status.podIP}"):$(kubectl get pod -n knative-serving -l "app=3scale-kourier-gateway" \
          --output=jsonpath="{.items[0].spec.containers[0].ports[0].containerPort}")

          ./test/scripts/gh-actions/run-e2e-tests.sh "kourier" "6"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh "kourier"

  test-llm:
    runs-on: ubuntu-latest
    needs: [kserve-image-build, huggingfaceserver-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull huggingface server image
        run: |
          docker pull "${GHCR_REPO}/huggingfaceserver:${TAG}"
          docker tag "${GHCR_REPO}/huggingfaceserver:${TAG}" "kserve/huggingfaceserver:${TAG}"
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "llm" "2"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-huggingface-server-vllm:
    runs-on: ubuntu-latest
    needs: [kserve-image-build, huggingfaceserver-build]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/e2e-test-setup

      - name: Pull base images
        uses: ./.github/actions/base-download

      - name: Pull huggingface server image
        run: |
          docker pull "${GHCR_REPO}/huggingfaceserver:${TAG}"
          docker tag "${GHCR_REPO}/huggingfaceserver:${TAG}" "kserve/huggingfaceserver:${TAG}"
          docker image ls

      - name: Install KServe
        run: |
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve

      - name: Run E2E tests
        timeout-minutes: 30
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "vllm" "1"

      - name: Check system status
        if: always()
        run: |
          ./test/scripts/gh-actions/status-check.sh

  test-modelcache:
    runs-on: ubuntu-latest
    needs: [kserve-image-build, huggingfaceserver-build]
    steps:
      - uses: actions/checkout@v4

      - name: Load KServe environment variables
        run: ./kserve-images.sh --ci

      - name: Free-up disk space
        uses: ./.github/actions/free-up-disk-space

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Create tmp-images directory
        run: |
          sudo mkdir -p /tmp-images
          sudo chown -R $USER /tmp-images

      - name: Setup Minikube
        uses: ./.github/actions/minikube-setup
        with:
          nodes: 3
          driver: "docker"
          start-args: "--mount --mount-string=/tmp-images:/tmp-images"

      - name: Create minikube tunnel
        run: |
          nohup minikube tunnel > minikube-tunnel.log 2>&1 &

      - name: KServe dependency setup
        uses: ./.github/actions/kserve-dep-setup

      - name: Pull and load base images into minikube nodes
        run: |
          for img in kserve-controller kserve-localmodel-controller kserve-localmodelnode-agent agent router storage-initializer; do
            docker pull "${GHCR_REPO}/${img}:${TAG}"
            docker tag "${GHCR_REPO}/${img}:${TAG}" "kserve/${img}:${TAG}"
            docker save "kserve/${img}:${TAG}" > "/tmp-images/${img}-${TAG}"
            minikube ssh -n minikube -- docker image load -i "/tmp-images/${img}-${TAG}"
            minikube ssh -n minikube-m02 -- docker image load -i "/tmp-images/${img}-${TAG}"
            minikube ssh -n minikube-m03 -- docker image load -i "/tmp-images/${img}-${TAG}"
          done
          sudo rm -rf /tmp-images/*
          minikube ssh -n minikube -- docker image ls
          minikube ssh -n minikube-m02 -- docker image ls
          minikube ssh -n minikube-m03 -- docker image ls

      - name: Pull and load huggingface server image into minikube
        run: |
          docker pull "${GHCR_REPO}/huggingfaceserver:${TAG}"
          docker tag "${GHCR_REPO}/huggingfaceserver:${TAG}" "kserve/huggingfaceserver:${TAG}"
          docker save "kserve/huggingfaceserver:${TAG}" > "/tmp-images/huggingfaceserver-${TAG}"
          minikube ssh -n minikube-m02 -- docker image load -i "/tmp-images/huggingfaceserver-${TAG}"
          sudo rm -rf /tmp-images/*
          minikube ssh -n minikube-m02 -- docker image ls

      - name: Create model root directory
        run: |
          minikube ssh -n minikube-m02 -- sudo mkdir -p -m=777 /models
          minikube ssh -n minikube-m03 -- sudo mkdir -p -m=777 /models

      - name: Install UV
        run: ./test/scripts/gh-actions/setup-uv.sh

      - name: Install KServe
        run: |
          export KSERVE_CUSTOM_ISVC_CONFIGS="localModel.enabled=true|localModel.defaultJobImage=kserve/storage-initializer:${TAG}"
          ./test/scripts/gh-actions/setup-kserve.sh

          kubectl get pods -n kserve
          kubectl describe pods -n kserve
          kubectl describe configmaps -n kserve inferenceservice-config
      - name: Create localmodel job namespace
        run: |
          kubectl create ns kserve-localmodel-jobs

      - name: Label worker nodes for modelcache
        run: |
          kubectl label nodes -l '!node-role.kubernetes.io/control-plane' kserve/localmodel=worker

      - name: Enable nodeselector in knative
        run: |
          kubectl patch configmaps -n knative-serving config-features --patch '{"data": {"kubernetes.podspec-nodeselector": "enabled"}}'

      - name: Run E2E tests
        timeout-minutes: 15
        run: |
          ./test/scripts/gh-actions/run-e2e-tests.sh "modelcache" "1"

      - name: Check system status
        if: always()
        run: |
          echo "::group::Minikube tunnel logs"
          cat minikube-tunnel.log
          echo "::endgroup::"
          ./test/scripts/gh-actions/status-check.sh
